name: Build and Push to ACR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-twdfskqpwvkfn2wh.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: crpi-twdfskqpwvkfn2wh.cn-shanghai.personal.cr.aliyuncs.com/agent_tools/tradingagents-cn:backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: crpi-twdfskqpwvkfn2wh.cn-shanghai.personal.cr.aliyuncs.com/agent_tools/tradingagents-cn:frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max
